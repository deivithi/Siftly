name: Sync upstream + redeploy

on:
  schedule:
    # Verifica atualizacoes todo dia as 08:00 UTC (05:00 horario de Brasilia)
    - cron: '0 8 * * *'
  workflow_dispatch: # permite execucao manual

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/viperrcrypto/Siftly.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          if [ "$UPSTREAM_SHA" = "$MERGE_BASE" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Sem novas atualizacoes no upstream."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Novas atualizacoes encontradas!"
            git log --oneline "$MERGE_BASE..upstream/main"
          fi

      - name: Resolve conflitos modify/delete conhecidos
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # Remove arquivos que o upstream deletou mas que existem no fork
          # Evita conflito modify/delete que --strategy-option=ours nao resolve
          git rm -f app/twitter-import/page.tsx 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nenhum arquivo de conflito pre-removido."
          else
            git commit -m "chore: remove arquivos deletados no upstream antes do merge"
          fi

      - name: Merge upstream (mantendo nossas customizacoes)
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # --strategy-option=ours garante que nossas modificacoes prevalecem em conflitos
          git merge upstream/main \
            --no-edit \
            --strategy-option=ours \
            -m "chore: sync upstream viperrcrypto/Siftly" \
          || {
            echo "Conflito de merge nao resolvivel automaticamente."
            git merge --abort
            exit 1
          }

      - name: Push para o fork
        if: steps.check.outputs.has_changes == 'true'
        run: git push origin main

      - name: Setup Node.js
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI e fazer deploy
        if: steps.check.outputs.has_changes == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --token "$VERCEL_TOKEN" --yes
